<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 - 소셜 커뮤니티 플랫폼</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header id="header">
    <div class="header-inner">
      <div class="header-left">
        <button class="menu-btn" id="menuBtn">☰</button>
        <a href="#/" class="logo">
          <span class="logo-icon">●</span>
          <span class="logo-text">커뮤니티</span>
        </a>
      </div>
      <div class="header-search">
        <input type="text" id="searchInput" placeholder="검색..." class="search-input">
        <button class="search-btn" id="searchBtn">🔍</button>
      </div>
      <div class="header-right" id="userSection">
        <!-- 동적으로 렌더링 -->
      </div>
    </div>
  </header>

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-title">게시판 목록</div>
      <nav id="boardNav"></nav>
      <div id="adminSidebarLink"></div>
    </div>
  </aside>

  <div id="overlay" class="overlay"></div>

  <main id="main">
    <div id="app"></div>
  </main>

  <!-- 로그인 모달 -->
  <div id="loginModal" class="modal">
    <div class="modal-content auth-modal">
      <button class="modal-close" id="loginClose">✕</button>
      <h2>로그인</h2>
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input type="text" class="form-input" id="loginUsername" placeholder="아이디 입력" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <div id="loginError" class="auth-error"></div>
      <button class="btn-primary auth-submit" id="loginSubmit">로그인</button>
      <div class="auth-switch">계정이 없으신가요? <button class="link-btn" id="goSignup">회원가입</button></div>
    </div>
  </div>

  <!-- 회원가입 모달 -->
  <div id="signupModal" class="modal">
    <div class="modal-content auth-modal">
      <button class="modal-close" id="signupClose">✕</button>
      <h2>회원가입</h2>
      <div class="form-group">
        <label class="form-label">아이디 <span class="form-hint">영문, 숫자, 밑줄 (4~20자)</span></label>
        <input type="text" class="form-input" id="signupUsername" placeholder="아이디" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">닉네임 <span class="form-hint">2~20자</span></label>
        <input type="text" class="form-input" id="signupNickname" placeholder="커뮤니티에서 표시될 이름">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 <span class="form-hint">6자 이상</span></label>
        <input type="password" class="form-input" id="signupPassword" placeholder="비밀번호" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인</label>
        <input type="password" class="form-input" id="signupPassword2" placeholder="비밀번호 재입력" autocomplete="new-password">
      </div>
      <div id="signupError" class="auth-error"></div>
      <button class="btn-primary auth-submit" id="signupSubmit">회원가입</button>
      <div class="auth-switch">이미 계정이 있으신가요? <button class="link-btn" id="goLogin">로그인</button></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="main.js"></script>
</body>
</html>
