<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 - 소셜 커뮤니티 플랫폼</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header id="header">
    <div class="header-inner">
      <div class="header-left">
        <button class="menu-btn" id="menuBtn">☰</button>
        <a href="#/" class="logo">
          <span class="logo-icon">●</span>
          <span class="logo-text">커뮤니티</span>
        </a>
      </div>
      <div class="header-search">
        <input type="text" id="searchInput" placeholder="검색..." class="search-input">
        <button class="search-btn" id="searchBtn">🔍</button>
      </div>
      <div class="header-right">
        <div id="userSection">
          <button class="btn-outline" id="nicknameBtn">닉네임 설정</button>
        </div>
        <button class="btn-primary write-btn" id="writeBtn">✏️ 글쓰기</button>
      </div>
    </div>
  </header>

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-title">게시판 목록</div>
      <nav id="boardNav"></nav>
    </div>
  </aside>

  <div id="overlay" class="overlay"></div>

  <main id="main">
    <div id="app"></div>
  </main>

  <div id="nicknameModal" class="modal">
    <div class="modal-content">
      <h2>닉네임 설정</h2>
      <p>커뮤니티에서 사용할 닉네임을 입력하세요.</p>
      <input type="text" id="nicknameInput" placeholder="닉네임 (2~20자)" maxlength="20">
      <div class="modal-btns">
        <button class="btn-outline" id="cancelNickname">취소</button>
        <button class="btn-primary" id="saveNickname">저장</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="main.js"></script>
</body>
</html>
